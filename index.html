<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GivyRewardsShop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0A0A; font-family: Arial, sans-serif; color: #EDEDED; padding: 20px; }
    h1 { text-align: center; color: #C5A267; margin-bottom: 20px; }
    .filters { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
    .filter-btn { background: #1A1A1A; border: 1px solid #333; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; }
    .filter-btn.active { background: #C5A267; color: black; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
    .product-card { background: #121212; border-radius: 16px; padding: 15px; transition: transform 0.2s; }
    .product-card:hover { transform: translateY(-5px); }
    .product-img { background: #1E1E1E; height: 250px; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; position: relative; cursor: pointer; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .img-placeholder { font-size: 60px; }
    .image-counter { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 20px; font-size: 11px; }
    .brand { color: #C5A267; font-size: 12px; }
    .title { font-size: 18px; font-weight: bold; margin: 8px 0; }
    .desc { color: #999; font-size: 13px; margin: 10px 0; line-height: 1.4; }
    .price { color: #C5A267; font-size: 20px; font-weight: bold; }
    .fb-btn { background: #1877F2; border: none; padding: 10px; border-radius: 30px; color: white; font-weight: bold; width: 100%; margin-top: 15px; cursor: pointer; }
    .admin-icon { position: fixed; bottom: 20px; left: 20px; width: 40px; height: 40px; background: #C5A267; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0.3; cursor: pointer; z-index: 999; }
    .empty { text-align: center; padding: 50px; color: #666; }
    .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.2s; cursor: pointer; }
    .lightbox.active { visibility: visible; opacity: 1; }
    .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; }
    .lightbox-close { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: white; }
  </style>
</head>
<body>
  <h1>🛋️ GivyRewardsShop</h1>
  <div id="filters" class="filters"></div>
  <div id="products" class="product-grid"><div class="empty">Loading...</div></div>
  <div class="admin-icon" id="adminIcon">👑</div>
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" src="">
  </div>

  <script>
    let products = [];
    let categories = ['furniture', 'seating', 'beds', 'rugs', 'decor', 'office'];
    let activeFilter = 'all';
    let globalFb = '';
    let clickCount = 0;

    function loadData() {
      const savedProducts = localStorage.getItem('givy_products');
      products = savedProducts ? JSON.parse(savedProducts) : [];
      
      const savedCats = localStorage.getItem('givy_categories');
      if(savedCats) categories = JSON.parse(savedCats);
      
      const savedFb = localStorage.getItem('givy_global_fb');
      globalFb = savedFb || '';
      
      renderFilters();
      renderProducts();
    }

    function renderFilters() {
      const container = document.getElementById('filters');
      container.innerHTML = `<button class="filter-btn active" data-cat="all">All</button>`;
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = cat;
        btn.onclick = () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = cat;
          renderProducts();
        };
        container.appendChild(btn);
      });
    }

    function openLightbox(images, index) {
      const lightbox = document.getElementById('lightbox');
      const img = document.getElementById('lightboxImg');
      img.src = images[index];
      lightbox.classList.add('active');
      lightbox.onclick = (e) => { if(e.target === lightbox) closeLightbox(); };
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    function openMessenger(fbUser, productName) {
      let user = fbUser || globalFb;
      if(!user) {
        alert(`Contact seller about: ${productName}\n\nNo Facebook username set. Admin can add it.`);
        return;
      }
      window.open('https://m.me/' + user.replace('@', ''), '_blank');
    }

    function renderProducts() {
      const container = document.getElementById('products');
      const filtered = activeFilter === 'all' ? products : products.filter(p => p.category === activeFilter);
      
      if(filtered.length === 0) {
        container.innerHTML = '<div class="empty">✨ No products</div>';
        return;
      }
      
      container.innerHTML = filtered.map((p, idx) => {
        const images = p.images && p.images.length ? p.images : [];
        const firstImage = images.length > 0 ? images[0] : null;
        const imageCount = images.length;
        
        return `
          <div class="product-card">
            <div class="product-img" onclick="openLightbox(${JSON.stringify(images)}, 0)">
              ${firstImage ? `<img src="${firstImage}" alt="${p.name}">` : '<div class="img-placeholder">🪑</div>'}
              ${imageCount > 1 ? `<div class="image-counter">📷 ${imageCount}</div>` : ''}
            </div>
            <div class="brand">${escapeHtml(p.brand || 'GIVY STUDIO')}</div>
            <div class="title">${escapeHtml(p.name)}</div>
            <div class="desc">${escapeHtml(p.desc || 'Luxury piece')}</div>
            <div class="price">$${p.price}</div>
            <button class="fb-btn" onclick="openMessenger('${p.fbUser || ''}', '${escapeHtml(p.name)}')">💬 Facebook interesting</button>
          </div>
        `;
      }).join('');
    }

    document.getElementById('adminIcon').onclick = () => {
      clickCount++;
      setTimeout(() => clickCount = 0, 500);
      if(clickCount >= 3) location.href = 'admin.html';
    };

    window.addEventListener('storage', (e) => {
      if(e.key === 'givy_products' || e.key === 'givy_categories') loadData();
    });

    function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : ''; }
    
    loadData();
  </script>
</body>
</html>
